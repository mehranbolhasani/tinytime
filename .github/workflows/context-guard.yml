name: Context guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-context:
    name: CONTEXT.md drift check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run context guard
        run: bash ../../scripts/check-context.sh
